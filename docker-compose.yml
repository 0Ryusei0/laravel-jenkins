services:
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins_laravel_app1
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - jenkins_laravel_network
    depends_on:
      - db
  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins_laravel_app2
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - jenkins_laravel_network
    depends_on:
      - db
  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins_laravel_app3
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    networks:
      - jenkins_laravel_network
    depends_on:
      - db
  webserver:
    image: nginx:alpine
    container_name: jenkins_laravel_webserver
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/load-balancer.conf:/etc/nginx/conf.d/default.conf
    networks:
      - jenkins_laravel_network
    depends_on:
      - app1
      - app2
      - app3
  db:
    image: mysql:5.7
    container_name: jenkins_laravel_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
      MYSQL_ROOT_PASSWORD: laravel
    volumes:
      - jenkins_dbdata:/var/lib/mysql
    networks:
      - jenkins_laravel_network
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: jenkins_laravel_phpmyadmin
    restart: unless-stopped
    ports:
      - "8086:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: secret
    networks:
      - jenkins_laravel_network
    depends_on:
      - db
volumes:
  jenkins_dbdata:
    driver: local
networks:
  jenkins_laravel_network:
    driver: bridge
